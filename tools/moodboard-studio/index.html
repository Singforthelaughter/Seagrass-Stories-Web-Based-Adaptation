<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moodboard Studio</title>
<style>
  :root {
    --bg: #0b1726;
    --panel: #11233a;
    --panel-2: #16304d;
    --line: #20364f;
    --text: #e8f0f8;
    --muted: #8aa3bd;
    --accent: #19c6c6;
    --accent-2: #2e7dd1;
    --danger: #ff6b6b;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .badge { margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  header .badge.ok { color: var(--accent); border-color: var(--accent); }
  header .badge.bad { color: var(--danger); border-color: var(--danger); }
  .layout { display: grid; grid-template-columns: 400px 1fr; gap: 0; height: calc(100vh - 60px); }
  .controls { padding: 20px; border-right: 1px solid var(--line); overflow-y: auto; }
  .gallery-wrap { padding: 20px; overflow-y: auto; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .5px; }
  textarea, input, select {
    width: 100%; background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 130px; line-height: 1.5; }
  .hidden { display: none; }

  /* parameter grid */
  #params { margin-top: 6px; border: 1px solid var(--line); border-radius: var(--radius); padding: 4px 14px 14px; background: rgba(255,255,255,.02); }
  #params .phead { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 4px; }
  .field { margin-top: 10px; }
  .field label { margin: 0 0 5px; }
  .field.check { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .field.check input { width: auto; }
  .field.check label { margin: 0; }
  .kv { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .kv input { flex: 1; }
  .kv .del { width: 34px; flex: none; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); border-radius: 8px; }
  .addkv { margin-top: 10px; background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; }

  button.primary {
    width: 100%; margin-top: 18px; padding: 12px; border: none; border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #04121f; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  button.primary:disabled { opacity: .55; cursor: not-allowed; }
  .status { margin-top: 12px; font-size: 13px; min-height: 18px; }
  .status.err { color: var(--danger); }
  .status.work { color: var(--accent); }

  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .card img { width: 100%; display: block; background: #000; cursor: zoom-in; }
  .card .meta { padding: 10px 12px; }
  .card .meta .model { font-size: 11px; color: var(--accent); margin-bottom: 4px; }
  .card .meta .prompt { font-size: 12px; color: var(--muted); max-height: 54px; overflow: hidden; }
  .card .meta .actions { margin-top: 8px; display: flex; gap: 10px; }
  .card .meta .actions a, .card .meta .actions button {
    font-size: 11px; color: var(--text); background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 8px; text-decoration: none; cursor: pointer;
  }
  .empty { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  .skeleton { aspect-ratio: 16/9; background: linear-gradient(90deg, var(--panel), var(--panel-2), var(--panel)); background-size: 200% 100%; animation: sh 1.2s infinite; border-radius: var(--radius); }
  @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; cursor: zoom-out; z-index: 50; }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }
</style>
</head>
<body>
  <header>
    <h1>🎨 Moodboard Studio</h1>
    <span class="sub">storyboard / moodboard image generation · local</span>
    <span id="tokenBadge" class="badge">checking…</span>
  </header>

  <div class="layout">
    <section class="controls">
      <label for="prompt">Prompt</label>
      <textarea id="prompt" placeholder="Describe the image…"></textarea>

      <label for="model">Model</label>
      <select id="model"></select>
      <input id="modelCustom" class="hidden" placeholder="owner/model-name" style="margin-top:8px" />

      <label style="margin-bottom:0">Parameters</label>
      <div id="params"></div>

      <button id="go" class="primary">Generate</button>
      <div id="status" class="status"></div>
    </section>

    <section class="gallery-wrap">
      <div id="gallery" class="gallery"></div>
    </section>
  </div>

  <div id="lightbox"><img id="lightboxImg" alt="" /></div>

<script>
const $ = (id) => document.getElementById(id);
let CONFIG = { models: [], has_token: false };

// Per-model parameter schemas. Defaults match the documented Replicate inputs.
const SCHEMAS = {
  "openai/gpt-image-2": [
    { key: "aspect_ratio", label: "Aspect ratio", type: "select", options: ["1:1","3:2","2:3","16:9","9:16","auto","1024x1024","1536x1024","1024x1536","2048x2048","2048x1152","1152x2048","3840x2160","2160x3840"], default: "3:2" },
    { key: "quality", label: "Quality", type: "select", options: ["low","medium","high","auto"], default: "auto" },
    { key: "number_of_images", label: "Number of images", type: "number", min: 1, max: 10, step: 1, default: 1 },
    { key: "output_format", label: "Output format", type: "select", options: ["webp","png","jpeg"], default: "webp" },
    { key: "background", label: "Background", type: "select", options: ["auto","opaque"], default: "auto" },
    { key: "moderation", label: "Moderation", type: "select", options: ["auto","low"], default: "auto" },
  ],
  "google/nano-banana-pro": [
    { key: "aspect_ratio", label: "Aspect ratio", type: "select", options: ["match_input_image","1:1","2:3","3:2","3:4","4:3","4:5","5:4","9:16","16:9","21:9"], default: "4:3" },
    { key: "resolution", label: "Resolution", type: "select", options: ["1K","2K","4K"], default: "2K" },
    { key: "output_format", label: "Output format", type: "select", options: ["png","jpg"], default: "png" },
    { key: "safety_filter_level", label: "Safety filter", type: "select", options: ["block_low_and_above","block_medium_and_above","block_only_high"], default: "block_only_high" },
    { key: "allow_fallback_model", label: "Allow fallback model", type: "checkbox", default: false },
  ],
};

async function loadConfig() {
  let offline = false;
  try {
    const res = await fetch("/api/config");
    if (!res.ok) throw new Error("bad status");
    CONFIG = await res.json();
  } catch (e) {
    // Page opened without the backend (e.g. file:// or a static preview).
    offline = true;
    CONFIG = { models: Object.keys(SCHEMAS), has_token: false };
  }

  const modelSel = $("model");
  modelSel.innerHTML = "";
  const models = (CONFIG.models && CONFIG.models.length) ? CONFIG.models : Object.keys(SCHEMAS);
  models.forEach(m => modelSel.add(new Option(m, m)));
  modelSel.add(new Option("Custom…", "__custom__"));
  modelSel.onchange = onModelChange;

  const badge = $("tokenBadge");
  if (offline) {
    badge.textContent = "server not connected — run python server.py";
    badge.className = "badge bad";
  } else if (CONFIG.has_token) {
    badge.textContent = "API key: set"; badge.className = "badge ok";
  } else {
    badge.textContent = "API key: missing"; badge.className = "badge bad";
  }

  onModelChange();
}

function selectedModel() {
  const v = $("model").value;
  return v === "__custom__" ? $("modelCustom").value.trim() : v;
}

function onModelChange() {
  const isCustom = $("model").value === "__custom__";
  $("modelCustom").classList.toggle("hidden", !isCustom);
  renderParams(isCustom ? null : $("model").value);
}

function renderParams(model) {
  const c = $("params");
  const schema = model && SCHEMAS[model];
  if (schema) {
    c.innerHTML = schema.map(fieldHTML).join("");
    return;
  }
  // custom / unknown model → editable key/value rows (no JSON)
  c.innerHTML = `<div class="phead">Custom parameters</div>
    <div id="kvRows"></div>
    <button type="button" class="addkv" id="addKv">+ Add parameter</button>`;
  $("addKv").onclick = () => addKvRow();
  addKvRow();
}

function fieldHTML(f) {
  if (f.type === "select") {
    const opts = f.options.map(o => `<option value="${o}"${o===f.default?" selected":""}>${o}</option>`).join("");
    return `<div class="field"><label>${f.label}</label>
      <select data-pkey="${f.key}" data-ptype="select">${opts}</select></div>`;
  }
  if (f.type === "number") {
    return `<div class="field"><label>${f.label}</label>
      <input type="number" data-pkey="${f.key}" data-ptype="number"
        value="${f.default}" min="${f.min ?? ""}" max="${f.max ?? ""}" step="${f.step ?? 1}" /></div>`;
  }
  if (f.type === "checkbox") {
    return `<div class="field check">
      <input type="checkbox" id="p_${f.key}" data-pkey="${f.key}" data-ptype="checkbox"${f.default?" checked":""} />
      <label for="p_${f.key}">${f.label}</label></div>`;
  }
  return `<div class="field"><label>${f.label}</label>
    <input type="text" data-pkey="${f.key}" data-ptype="text" value="${f.default ?? ""}" /></div>`;
}

function addKvRow(key = "", val = "") {
  const row = document.createElement("div");
  row.className = "kv";
  row.innerHTML = `<input class="kv-key" placeholder="key" value="${key}" />
    <input class="kv-val" placeholder="value" value="${val}" />
    <button type="button" class="del" title="remove">✕</button>`;
  row.querySelector(".del").onclick = () => row.remove();
  $("kvRows").appendChild(row);
}

function inferType(raw) {
  if (raw === "true") return true;
  if (raw === "false") return false;
  if (raw !== "" && !isNaN(Number(raw))) return Number(raw);
  return raw;
}

function collectParams() {
  const params = {};
  // schema controls
  document.querySelectorAll("#params [data-pkey]").forEach(el => {
    const key = el.dataset.pkey, type = el.dataset.ptype;
    if (type === "checkbox") { params[key] = el.checked; return; }
    if (type === "number") { if (el.value === "") return; params[key] = Number(el.value); return; }
    if (el.value === "") return;
    params[key] = el.value;
  });
  // custom key/value rows
  document.querySelectorAll("#params .kv").forEach(row => {
    const k = row.querySelector(".kv-key").value.trim();
    const v = row.querySelector(".kv-val").value.trim();
    if (!k || v === "") return;
    params[k] = inferType(v);
  });
  return params;
}

function cardHTML(item) {
  const url = "/outputs/" + item.file;
  const prompt = (item.prompt || "").replace(/</g, "&lt;");
  return `<div class="card">
    <img src="${url}" alt="" onclick="openLightbox('${url}')" />
    <div class="meta">
      <div class="model">${item.model || ""} · ${item.aspect_ratio || ""}</div>
      <div class="prompt">${prompt}</div>
      <div class="actions">
        <a href="${url}" download>Download</a>
        <button onclick="reusePrompt(${JSON.stringify(prompt).replace(/"/g,'&quot;')})">Reuse prompt</button>
      </div>
    </div>
  </div>`;
}

function reusePrompt(p) { $("prompt").value = p; window.scrollTo(0,0); }

async function loadGallery() {
  const g = $("gallery");
  let items = [];
  try {
    const res = await fetch("/api/gallery");
    if (!res.ok) throw new Error("bad status");
    items = (await res.json()).items || [];
  } catch (e) {
    g.innerHTML = '<div class="empty">Not connected to the server. Run <code>python server.py</code> and open <b>http://localhost:8000</b> in your browser (the editor preview panel can\'t run the backend).</div>';
    return;
  }
  if (!items.length) { g.innerHTML = '<div class="empty">No images yet. Generate your first one →</div>'; return; }
  g.innerHTML = items.map(cardHTML).join("");
}

function openLightbox(url) { $("lightboxImg").src = url; $("lightbox").style.display = "flex"; }
$("lightbox").onclick = () => { $("lightbox").style.display = "none"; };

async function generate() {
  const prompt = $("prompt").value.trim();
  const model = selectedModel();
  const status = $("status");

  if (!prompt) { status.textContent = "Enter a prompt first."; status.className = "status err"; return; }
  if (!model) { status.textContent = "Pick or enter a model."; status.className = "status err"; return; }

  const params = collectParams();

  $("go").disabled = true;
  status.textContent = "Generating… (this can take 10–60s)"; status.className = "status work";
  const g = $("gallery");
  if (g.querySelector(".empty")) g.innerHTML = "";
  g.insertAdjacentHTML("afterbegin", '<div class="skeleton" id="sk"></div>');

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, model, params }),
    });
    const data = await res.json();
    $("sk")?.remove();
    if (!res.ok) throw new Error(data.error || "Generation failed.");
    status.textContent = `Done — ${data.items.length} image(s).`; status.className = "status work";
    await loadGallery();
  } catch (e) {
    $("sk")?.remove();
    status.textContent = e.message; status.className = "status err";
  } finally {
    $("go").disabled = false;
  }
}

$("go").onclick = generate;
loadConfig().then(loadGallery);
</script>
</body>
</html>
